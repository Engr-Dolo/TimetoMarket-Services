<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>TimetoMarket-Services</title>
  <script>
    var l = window.location;
    var segmentCount = 1;
    l.replace(
      l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1 + segmentCount).join('/') +
      '/?p=/' + l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>

<body>Redirecting...</body>

</html>
